<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ملكة تنسيق الحدائق</title><meta name="description" content="قالب تنسيق حدائق ولاندسكيب بنفس هيكل ومسارات موقع مرجعي، مع محتوى قابل للتعديل."><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;font-family:Cairo,Tahoma,Arial,sans-serif;background:#fffaf2;color:#20301c;line-height:1.8}a{text-decoration:none;color:inherit}.container{width:min(1180px,92%);margin:auto}.top{background:#183512;color:#fff;padding:8px 0}.top .container{display:flex;gap:24px}.nav{position:sticky;top:0;z-index:10;background:#fffaf2e8;backdrop-filter:blur(12px);border-bottom:1px solid #eadfcd}.navin{height:86px;display:flex;align-items:center;justify-content:space-between}.brand{font-size:24px;font-weight:900;display:flex;gap:10px;align-items:center}.mark{background:linear-gradient(135deg,#436f37,#86aa5d);color:#fff;width:52px;height:52px;border-radius:18px;display:grid;place-items:center}.menu{display:flex;gap:6px;align-items:center}.menu a,.drop>a{padding:11px 15px;border-radius:999px;font-weight:800}.menu a:hover,.drop:hover>a{background:#f2eadc}.drop{position:relative}.panel{position:absolute;right:0;top:48px;background:#fff;border:1px solid #eadfcd;box-shadow:0 18px 45px #1d2e171f;border-radius:22px;padding:13px;width:430px;display:grid;grid-template-columns:1fr 1fr;gap:6px;opacity:0;visibility:hidden;transform:translateY(8px);transition:.2s}.drop:hover .panel{opacity:1;visibility:visible;transform:none}.hero{min-height:660px;display:grid;place-items:center;background:linear-gradient(115deg,#183512d9,#4f7938b8),radial-gradient(circle at 20% 20%,#d9c28b,transparent 26%),linear-gradient(135deg,#5f8f44,#d8c391);color:#fff;position:relative;overflow:hidden}.hero:after{content:'';position:absolute;bottom:-80px;left:0;right:0;height:160px;background:#fffaf2;border-radius:55% 55% 0 0}.hero .container{position:relative;z-index:1}.hero h1{font-size:clamp(38px,6vw,76px);line-height:1.15;margin:12px 0}.hero p,.lead{font-size:20px;max-width:760px}.btn{display:inline-flex;background:#436f37;color:#fff;border:2px solid #436f37;padding:13px 24px;border-radius:999px;font-weight:900;margin:6px;box-shadow:0 14px 36px #20301c22}.btn.alt{background:#fff;color:#24451f;border-color:#fff}.section{padding:86px 0}.title{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:30px}.title h2,.text h2{font-size:clamp(30px,4vw,48px);margin:0;line-height:1.25}.muted{color:#64745d}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}.features{grid-template-columns:repeat(4,1fr);margin-top:-70px;position:relative;z-index:2}.card,.feature,.box{background:#fff;border:1px solid #eadfcd;border-radius:28px;box-shadow:0 18px 45px #1d2e171f;overflow:hidden}.feature{padding:25px}.visual{aspect-ratio:16/10;background:linear-gradient(135deg,#426f37,#d7c08f);position:relative}.visual:before{content:'';position:absolute;inset:18%;border:14px solid #ffffffb8;border-top-color:transparent;border-radius:50%}.card .body,.box{padding:25px}.split{display:grid;grid-template-columns:1fr 1fr;gap:42px;align-items:center}.image{min-height:420px;border-radius:34px;background:linear-gradient(135deg,#e7d8bd,#5d8945);box-shadow:0 18px 45px #1d2e171f}.cta{background:linear-gradient(135deg,#183512,#436f37);color:#fff;border-radius:38px;padding:48px;display:flex;justify-content:space-between;gap:20px;align-items:center}.why{background:#f2eadc}.whygrid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.num{background:#436f37;color:#fff;border-radius:16px;width:44px;height:44px;display:grid;place-items:center;font-weight:900}.pagehero{background:linear-gradient(135deg,#183512,#6f8f4c);color:#fff;padding:75px 0}.pagehero h1{font-size:clamp(34px,5vw,64px);margin:0 0 8px}.service{display:grid;grid-template-columns:1fr 340px;gap:26px}.side{position:sticky;top:110px;background:#f2eadc;border-radius:26px;padding:20px}.side a{display:block;padding:9px 12px;border-radius:12px}.side a:hover{background:#fff}.contact{display:grid;grid-template-columns:1fr 1fr;gap:24px}.input{width:100%;padding:14px;border:1px solid #eadfcd;border-radius:15px;margin:8px 0;font:inherit}.footer{background:#142313;color:#dfe9d7;padding-top:64px}.foot{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:30px}.foot a{display:block;margin:7px 0}.copy{text-align:center;border-top:1px solid #ffffff24;margin-top:40px;padding:20px}@media(max-width:850px){.menu{display:none}.grid,.features,.whygrid,.split,.service,.contact,.foot{grid-template-columns:1fr}.title,.cta{display:block}.panel{position:static;opacity:1;visibility:visible;transform:none;box-shadow:none;width:auto}.hero{min-height:520px}}</style></head><body><div id="app"></div><script>const NAME='ملكة تنسيق الحدائق',PHONE='0500000000',CITY='الرياض';const S=[['مظلات-وجلسات','مظلات وجلسات'],['جلسات-الحديقة','تنسيق حدائق - تركيب ثيل طبيعي'],['شلالات-ونوافير','شلالات ونوافير'],['قص-اشجار','قص أشجار'],['احواض-زراعية','أحواض زراعية طبيعية'],['ممرات-حجرية','ممرات حجرية'],['احواض-زراعة-صناعية','أحواض زراعة صناعية'],['شبكة-رذاذ','شبكة رذاذ'],['شبكة-ري','شبكة ري'],['غرف-زجاج','غرف زجاج']];const B=[['2025/11/16/أهمية-تنسيق-الحدائق-في-تحسين-جمال-المنزل','أهمية تنسيق الحدائق في تحسين جمال المنزل'],['2025/11/16/مميزات-تركيب-الثيل-الطبيعي-للحدائق','مميزات تركيب الثيل الطبيعي للحدائق'],['2025/11/16/الشلالات-والنوافير-ودورها-في-فخامة-الحدائق','الشلالات والنوافير ودورها في فخامة الحدائق']];let path=decodeURI(location.pathname).replace(/^\/|\/$/g,'');if(path==='الرئيسية')path='';const app=document.getElementById('app');function url(x){return '/'+x.replace(/^\//,'')}function desc(t){return t.includes('رذاذ')?'شبكات رذاذ للجلسات والحدائق والمقاهي لتلطيف الأجواء.':t.includes('ري')?'شبكات ري حديثة توفر المياه وتحافظ على النباتات.':t.includes('زجاج')?'غرف زجاج وجلسات مغلقة بتصاميم عصرية.':t.includes('مظلات')?'مظلات وبرجولات وجلسات خارجية أنيقة ومريحة.':t.includes('شلالات')?'شلالات ونوافير تضيف صوت الماء ولمسة فاخرة.':t.includes('أشجار')?'قص وتشكيل الأشجار باحترافية وبطريقة آمنة.':t.includes('أحواض')?'أحواض زراعية عملية وجميلة لتنظيم النباتات.':t.includes('ممرات')?'ممرات حجرية تضيف جمالًا وتسهل الحركة.':'تصميم حدائق وتركيب ثيل طبيعي وصناعي باحترافية.'}function nav(){let svc=S.map(s=>`<a href="${url(s[0])}/">${s[1]}</a>`).join('');return `<div class="top"><div class="container"><span>${CITY}</span><a href="tel:${PHONE}">${PHONE}</a></div></div><nav class="nav"><div class="container navin"><a class="brand" href="/"><span class="mark">م</span>${NAME}</a><div class="menu"><a href="/">الرئيسية</a><a href="/من-نحن/">من نحن</a><div class="drop"><a href="/الخدمات/">الخدمات</a><div class="panel">${svc}</div></div><a href="/تواصل-معنا/">تواصل معنا</a></div></div></nav>`}function foot(){return `<footer class="footer"><div class="container foot"><div><a class="brand" href="/"><span class="mark">م</span>${NAME}</a><p>قالب تنسيق حدائق static نظيف، قابل للتعديل على GitHub ونشره على Vercel.</p></div><div><h3>الصفحات</h3><a href="/">الرئيسية</a><a href="/من-نحن/">من نحن</a><a href="/الخدمات/">الخدمات</a><a href="/تواصل-معنا/">تواصل معنا</a></div><div><h3>تواصل معنا</h3><p>${CITY}</p><a href="tel:${PHONE}">${PHONE}</a><a href="https://wa.me/966500000000">واتساب</a></div></div><div class="copy">© 2026 ${NAME}</div></footer>`}function ph(t,p){return `<section class="pagehero"><div class="container"><h1>${t}</h1><p class="lead">${p}</p></div></section>`}function cards(){return `<div class="grid">${S.map(s=>`<article class="card"><div class="visual"></div><div class="body"><h3>${s[1]}</h3><p class="muted">${desc(s[1])}</p><a class="btn" href="${url(s[0])}/">تفاصيل أكثر</a></div></article>`).join('')}</div>`}function home(){let f=['Gardening','Landscaping','Maintenance','Nursery'].map(x=>`<div class="feature"><h3>${x}</h3><p class="muted">حلول عملية ضمن منظومة تنسيق الحدائق.</p></div>`).join('');let why=['خبرة طويلة ومشاريع ناجحة','جودة عالية في المواد والتنفيذ','خدمات متكاملة من التصميم إلى التنفيذ','أسعار مرنة ومتابعة مستمرة'].map((x,i)=>`<div class="box"><span class="num">${i+1}</span><h3>${x}</h3><p class="muted">نركز على نتيجة واضحة وجميلة وسهلة الصيانة.</p></div>`).join('');let blog=B.map(b=>`<article class="card"><div class="visual"></div><div class="body"><small>نوفمبر 16, 2025</small><h3>${b[1]}</h3><p class="muted">مقال إرشادي ضمن هيكل المدونة قابل للتعديل لاحقًا.</p><a class="btn" href="${url(b[0])}/">قراءة المقال</a></div></article>`).join('');return `<section class="hero"><div class="container"><span>تنسيق حدائق ولاندسكيب</span><h1>نحوّل مساحتك إلى حديقة أنيقة تعكس ذوقك</h1><p>خدمات تنسيق حدائق، ثيل طبيعي وصناعي، شلالات ونوافير، مظلات وبرجولات، وشبكات ري ورذاذ.</p><a class="btn" href="/تواصل-معنا/">تواصل معنا</a><a class="btn alt" href="/من-نحن/">من نحن</a></div></section><section class="container grid features">${f}</section><section class="section"><div class="container split"><div class="text"><h2>من نحن</h2><p class="muted">فريق متخصص في تصميم وتنفيذ المساحات الخضراء بطريقة عملية وجمالية، من التخطيط حتى التسليم والمتابعة.</p><a class="btn" href="/من-نحن/">قراءة المزيد</a></div><div class="image"></div></div></section><section class="section"><div class="container cta"><div><h2>جاهز لبدء مشروع حديقتك؟</h2><p>نساعدك على اختيار أفضل حل للمساحة والميزانية.</p></div><a class="btn alt" href="/تواصل-معنا/">اطلب استشارة</a></div></section><section class="section"><div class="container"><div class="title"><h2>تعرّف على خدماتنا المتميزة</h2><a class="btn" href="/الخدمات/">كل الخدمات</a></div>${cards()}</div></section><section class="section why"><div class="container"><div class="title"><h2>أسباب تجعلنا الخيار الأفضل</h2></div><div class="whygrid">${why}</div></div></section><section class="section"><div class="container"><div class="title"><h2>المدونة والمقالات</h2></div><div class="grid">${blog}</div></div></section>`}function about(){return ph('من نحن','فريق تنسيق حدائق يقدم حلولًا عملية وجمالية للمساحات الخارجية.')+`<section class="section"><div class="container split"><div class="box"><h2>خبرة في تحويل المساحات</h2><p class="muted">نفهم طبيعة المكان واحتياجات العميل قبل اقتراح التصميم، ثم نضع تصورًا واضحًا للنباتات والمسارات والجلسات والري.</p><p class="muted">يمكنك تعديل هذا المحتوى لاحقًا ليحمل اسم شركتك وخبراتك وصور أعمالك.</p></div><div class="image"></div></div></section>`}function services(){return ph('الخدمات','كل ما تحتاجه لتصميم وتنفيذ حديقة متكاملة في مكان واحد.')+`<section class="section"><div class="container">${cards()}</div></section>`}function service(s){let side=S.map(x=>`<a href="${url(x[0])}/">${x[1]}</a>`).join('');return ph(s[1],desc(s[1]))+`<section class="section"><div class="container service"><main class="box"><div class="visual"></div><h2>${s[1]}</h2><p class="muted">${desc(s[1])}</p><p class="muted">تبدأ الخدمة بمعاينة المساحة وتحديد المقاسات، ثم اختيار المواد المناسبة وتنفيذ العمل بنظام واضح وقابل للمتابعة.</p><a class="btn" href="/تواصل-معنا/">اطلب الخدمة الآن</a></main><aside class="side"><h3>خدماتنا</h3>${side}</aside></div></section>`}function contact(){return ph('تواصل معنا','يسعدنا الرد على استفسارك وتنسيق موعد مناسب لمعاينة المساحة.')+`<section class="section"><div class="container contact"><div class="box"><h2>بيانات التواصل</h2><p><b>الموقع:</b> ${CITY}</p><p><b>الهاتف:</b> <a href="tel:${PHONE}">${PHONE}</a></p><a class="btn" href="https://wa.me/966500000000">واتساب</a></div><div class="box"><h2>أرسل طلبك</h2><input class="input" placeholder="الاسم"><input class="input" placeholder="رقم الجوال"><textarea class="input" rows="6" placeholder="تفاصيل الخدمة"></textarea><button class="btn">إرسال</button></div></div></section>`}function article(b){return ph(b[1],'مقال إرشادي ضمن هيكل المدونة.')+`<section class="section"><div class="container service"><article class="box"><h2>${b[1]}</h2><p class="muted">هذا محتوى بديل قابل للتعديل. يمكن لاحقًا إضافة صور أعمال حقيقية ونصوص حصرية وروابط داخلية للخدمات.</p><p class="muted">الغرض هنا بناء نفس هيكل المدونة والمسارات بدون نسخ نصوص أو صور محمية.</p></article><aside class="side"><h3>مقالات أخرى</h3>${B.map(x=>`<a href="${url(x[0])}/">${x[1]}</a>`).join('')}</aside></div></section>`}let body;if(!path)body=home();else if(path==='من-نحن')body=about();else if(path==='الخدمات')body=services();else if(path==='تواصل-معنا')body=contact();else{let s=S.find(x=>x[0]===path);let b=B.find(x=>x[0]===path);body=s?service(s):b?article(b):home()}app.innerHTML=nav()+body+foot();document.title=(!path?'الرئيسية':(S.find(x=>x[0]===path)?.[1]||B.find(x=>x[0]===path)?.[1]||'صفحة'))+' | '+NAME;</script></body></html>
